
name: Publish NuGet

on:
  release:
    types: [ published ]

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore & Build
        run: dotnet build --configuration Release

      - name: Run tests
        run: dotnet test --configuration Release

      - name: Pack
        run: dotnet pack src/MyLib/MyLib.csproj --configuration Release --no-build

      - name: Push to NuGet
        run: dotnet nuget push src/MyLib/bin/Release/*.nupkg --api-key ${{ secrets.NUGET }} --source https://api.nuget.org/v3/index.json
